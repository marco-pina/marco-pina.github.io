services:
  jekyll-site:
    image: jekyll-site
    build: .
    volumes: [ .:/usr/src/app ]
    ports: [ 4000:4000 ]
    user: 1000:1000
    environment: [ JEKYLL_ENV=development ]
    command: bash -c "jekyll build --watch --force_polling --config _config.yml,_config.dev.yml & ruby -run -ehttpd /usr/src/app/_site -b0.0.0.0 -p4000"
